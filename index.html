<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sales & Booking App</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="login-screen" style="display: flex; height: 100vh; flex-direction: column; justify-content: center; align-items: center; padding: 20px; max-width: 600px; margin: 0 auto;">
        <div class="card" style="width: 100%;">
            <h2 style="text-align:center; margin-bottom: 20px;">Staff Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required autocomplete="current-password">
                </div>
                <div id="login-error" style="color:red; font-size:0.9rem; margin-bottom:15px; text-align:center; display:none;"></div>
                <button type="submit" class="btn" id="login-btn">Log In</button>
            </form>
        </div>
    </div>

    <div id="app" style="display: none;">
        <!-- Global Top Header -->
        <header style="display:flex; justify-content:space-between; align-items:center; padding: 15px 20px; background:var(--card-bg); border-bottom:1px solid var(--border-color); flex-shrink: 0;">
            <div style="font-weight:700; font-size:1.1rem; color:var(--text-primary); display:flex; align-items:center; gap:8px;">
                <i data-lucide="sun"></i> Sunshine
            </div>
            <button id="btn-logout" style="background:none; border:none; color:#ef4444; font-weight:600; font-size:0.9rem; cursor:pointer; display:flex; align-items:center; gap:4px;">
                <i data-lucide="log-out" style="width:16px; height:16px;"></i> Logout
            </button>
        </header>

        <!-- Main Content Area -->
        <main id="main-content"></main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav">
            <button class="nav-btn active" data-tab="entry">
                <i data-lucide="plus-circle"></i>
                <span>Entry</span>
            </button>
            <button class="nav-btn" data-tab="records">
                <i data-lucide="list"></i>
                <span>Records</span>
            </button>
            <button class="nav-btn" data-tab="reports">
                <i data-lucide="bar-chart-2"></i>
                <span>Reports</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/metrics.js"></script>
    <script src="js/components.js"></script>
    <script src="js/exportExcel.js"></script>
    <script src="js/screens/entry.js"></script>
    <script src="js/screens/records.js"></script>
    <script src="js/screens/reports.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
